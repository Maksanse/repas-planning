<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Repas · Planning</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1917;-webkit-font-smoothing:antialiased}
#root{min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
input,textarea,select{font-family:inherit}
img{display:block}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.2);border-radius:2px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(6px);animation:fi .18s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;padding-bottom:32px;animation:su .22s ease}
@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.handle{width:36px;height:4px;background:rgba(0,0,0,0.12);border-radius:2px;margin:12px auto 0}
input[type=text],input[type=url],textarea,select{width:100%;padding:10px 12px;border:1.5px solid rgba(0,0,0,0.13);border-radius:10px;font-size:14px;color:#1a1917;background:#fff;outline:none;transition:border-color .15s;display:block}
input:focus,textarea:focus,select:focus{border-color:#d4836a}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ─── DATA ──────────────────────────────────────────────────────────────────
const DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const DAYS_FULL=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

const INIT_RECIPES=[
  {id:'r1',name:'Riz au Poulet',type:'both',ingredients:['Riz 180g cru','Poulet 200g','Huile olive','Paprika, cumin','Citron ½','Persil'],steps:['Cuire le riz 18 min salé.','Assaisonner poulet, dorer 4 min/face.','Trancher et servir sur le riz.'],image:'https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=400&q=80',servings:2,prep:10,cook:20},
  {id:'r2',name:'Saumon Vapeur',type:'soir',ingredients:['Saumon 180g','Brocoli 200g','Carottes 150g','Sauce soja','Gingembre'],steps:['Légumes vapeur 12 min.','Poêler saumon 3 min/face.','Servir ensemble.'],image:'https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=400&q=80',servings:1,prep:10,cook:15},
  {id:'r3',name:'Pasta Bolognaise',type:'both',ingredients:['Pâtes 120g','Bœuf haché 150g','Tomates concassées','Ail 2 gousses','Parmesan 20g'],steps:['Faire revenir ail et viande.','Tomates + herbes, mijoter 20 min.','Pâtes al dente + parmesan.'],image:'https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=400&q=80',servings:2,prep:10,cook:25},
  {id:'r4',name:'Buddha Bowl',type:'midi',ingredients:['Quinoa 80g','Pois chiches 100g','Avocat ½','Concombre','Tahini 20g'],steps:['Cuire quinoa 15 min.','Rôtir pois chiches 20 min à 200°C.','Assembler avec sauce tahini citronnée.'],image:'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400&q=80',servings:1,prep:15,cook:20},
  {id:'r5',name:'Omelette Champignons',type:'soir',ingredients:['Œufs 3','Champignons 150g','Emmental 30g','Échalote','Beurre'],steps:['Faire revenir échalote et champignons.','Battre œufs, verser en poêle.','Garnir et plier.'],image:'https://images.unsplash.com/photo-1510693206972-df098062cb71?w=400&q=80',servings:1,prep:5,cook:10},
  {id:'r6',name:'Soupe Lentilles',type:'soir',ingredients:['Lentilles corail 100g','Bouillon 600ml','Carotte','Oignon','Cumin 1cc'],steps:['Faire revenir oignon+cumin.','Ajouter lentilles et bouillon.','Mijoter 25 min puis mixer.'],image:'https://images.unsplash.com/photo-1547592166-23ac45744acd?w=400&q=80',servings:2,prep:10,cook:25},
];

function buildPlan(){
  const p={},t=new Date(),y=t.getFullYear(),m=t.getMonth(),dim=new Date(y,m+1,0).getDate(),ids=['r1','r2','r3','r4','r5','r6'];
  for(let d=1;d<=dim;d++){const k=key(y,m,d);p[k]={midi:ids[(d-1)%6],soir:ids[(d+2)%6]};}
  return p;
}

function key(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function dow(date){const d=date.getDay();return d===0?6:d-1;}
function weekDays(date){const d=new Date(date);d.setDate(d.getDate()-dow(d));return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x;});}
// localStorage comme cache local (fallback offline)
function loadLocal(k,def){try{const s=localStorage.getItem(k);return s?JSON.parse(s):def;}catch{return def;}}
function saveLocal(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ─── SUPABASE ──────────────────────────────────────────────────────────────
const SB_URL='https://nvutjzxstfsjcsfbanpo.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dXRqenhzdGZzamNzZmJhbnBvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MTI3MzcsImV4cCI6MjA5NzI4ODczN30.WHdu2Y-sSrZGG9Pi_w5z7kKD_eG5cK5hKFaxIaQME3w';
const sbH={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

async function sbFetch(path,opts={}){
  const r=await fetch(SB_URL+'/rest/v1/'+path,{headers:{...sbH,...(opts.headers||{})},method:opts.method||'GET',body:opts.body});
  if(!r.ok)throw new Error(await r.text());
  const txt=await r.text();return txt?JSON.parse(txt):[];
}

async function loadFromSupabase(){
  try{
    const[recs,days]=await Promise.all([sbFetch('recipes?select=*&order=id'),sbFetch('planning?select=*')]);
    const recipes=recs.length>0?recs.map(r=>r.data):null;
    const planning={};
    days.forEach(d=>{planning[d.day_key]={...(d.midi?{midi:d.midi}:{}),..( d.soir?{soir:d.soir}:{})};});
    return{recipes,planning:Object.keys(planning).length>0?planning:null};
  }catch(e){console.warn('Supabase load error:',e);return{recipes:null,planning:null};}
}

async function saveRecipesToSupabase(recipes){
  try{
    await sbFetch('recipes',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify(recipes.map(r=>({id:r.id,data:r,updated_at:new Date().toISOString()})))});
  }catch(e){console.warn('SB save recipes:',e);}
}

async function savePlanningToSupabase(planning){
  try{
    const rows=Object.entries(planning).map(([k,v])=>({day_key:k,midi:v.midi||null,soir:v.soir||null,updated_at:new Date().toISOString()}));
    for(let i=0;i<rows.length;i+=50)
      await sbFetch('planning',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(rows.slice(i,i+50))});
  }catch(e){console.warn('SB save planning:',e);}
}

async function deleteRecipeFromSupabase(id){
  try{await sbFetch('recipes?id=eq.'+id,{method:'DELETE'});}catch(e){console.warn('SB delete:',e);}
}

// ─── MINI FRAMEWORK ────────────────────────────────────────────────────────
let _state={
  recipes:loadLocal('rp_rec',INIT_RECIPES),
  planning:loadLocal('rp_plan',null)||buildPlan(),
  view:'month',
  curYear:new Date().getFullYear(),
  curMonth:new Date().getMonth(),
  wkDate:new Date(),
  modal:null,
  syncing:false,
};

function setState(patch){
  _state=Object.assign({},_state,typeof patch==='function'?patch(_state):patch);
  render();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────
function getRecipe(id){return _state.recipes.find(r=>r.id===id);}
function isToday(y,m,d){const t=new Date();return t.getFullYear()===y&&t.getMonth()===m&&t.getDate()===d;}
function colSlot(slot){return slot==='midi'?'#dde8f8':'#e8dcf8';}
function colText(slot){return slot==='midi'?'#2d4d80':'#4d2d80';}
function typeLabel(t){return t==='both'?'Midi & Soir':t==='midi'?'Déjeuner':'Dîner';}
function typeColor(t){return t==='both'?{bg:'#d8f0e4',c:'#1a5c38'}:t==='midi'?{bg:'#dde8f8',c:'#2d4d80'}:{bg:'#e8dcf8',c:'#4d2d80'};}

// ─── DOM HELPERS ──────────────────────────────────────────────────────────
function el(tag,props,...children){
  const e=document.createElement(tag);
  if(props){
    Object.entries(props).forEach(([k,v])=>{
      if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
      else if(k.startsWith('on')&&typeof v==='function')e.addEventListener(k.slice(2).toLowerCase(),v);
      else if(k==='className')e.className=v;
      else if(k==='htmlFor')e.htmlFor=v;
      else if(k==='value'&&(tag==='input'||tag==='textarea'||tag==='select')){e.value=v;}
      else if(k==='checked')e.checked=v;
      else if(k!=='key')e.setAttribute(k,v);
    });
  }
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return e;
}
function div(style,...children){return el('div',{style},...children);}
function btn(style,onClick,...children){return el('button',{style,onClick},...children);}
function txt(tag,style,text){const e=document.createElement(tag);Object.assign(e.style,style);e.textContent=text;return e;}
function img(src,style){const e=document.createElement('img');e.src=src;Object.assign(e.style,style);return e;}

// SVG icon
function icon(name,size=16,color='currentColor'){
  const paths={
    cal:'M8 2v2m8-2v2M3 8h18M5 4h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z',
    grid:'M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z',
    book:'M4 19.5A2.5 2.5 0 016.5 17H20M4 19.5A2.5 2.5 0 004 17V5a2 2 0 012-2h14v14H6.5a2.5 2.5 0 00-2.5 2.5z',
    plus:'M12 5v14M5 12h14',
    x:'M18 6L6 18M6 6l12 12',
    edit:'M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z',
    trash:'M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2',
    cl:'M15 18l-6-6 6-6',cr:'M9 18l6-6-6-6',
    ck:'M20 6L9 17l-5-5',
    clk:'M12 2a10 10 0 100 20A10 10 0 0012 2zM12 7v5l3 3',
    usr:'M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z',
    img:'M21 15l-5-5L5 21m16-6V5a2 2 0 00-2-2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2zm-10-9a1 1 0 11-2 0 1 1 0 012 0z',
    download:'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3',
  };
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',size);svg.setAttribute('height',size);
  svg.setAttribute('viewBox','0 0 24 24');svg.setAttribute('fill','none');
  svg.setAttribute('stroke',color);svg.setAttribute('stroke-width','1.8');
  svg.setAttribute('stroke-linecap','round');svg.setAttribute('stroke-linejoin','round');
  svg.style.display='inline-block';svg.style.verticalAlign='middle';svg.style.flexShrink='0';
  const path=document.createElementNS(ns,'path');
  path.setAttribute('d',paths[name]||'');
  svg.appendChild(path);
  return svg;
}

// ─── COMPONENTS ───────────────────────────────────────────────────────────

// ─── EXPORT / IMPORT JSON ─────────────────────────────────────────────────

function exportJSON(){
  const data={
    version:1,
    exportedAt:new Date().toISOString(),
    recipes:_state.recipes,
    planning:_state.planning,
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().slice(0,10);
  a.href=url;a.download=`repas-backup-${date}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function importJSON(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.recipes||!data.planning)throw new Error('Format invalide');
      if(!confirm(`Importer ${data.recipes.length} recettes et le planning du fichier ?\nCela remplacera toutes vos données actuelles.`))return;
      saveLocal('rp_rec',data.recipes);saveLocal('rp_plan',data.planning);saveRecipesToSupabase(data.recipes);savePlanningToSupabase(data.planning);
      setState({recipes:data.recipes,planning:data.planning,modal:null});
    }catch(err){alert('Fichier invalide : '+err.message);}
  };
  reader.readAsText(file);
}

function renderDataModal(){
  const overlay=div({});overlay.className='overlay';
  overlay.addEventListener('click',()=>setState({modal:null}));
  const sheet=div({});sheet.className='sheet';sheet.style.maxWidth='500px';
  sheet.addEventListener('click',e=>e.stopPropagation());
  const handle=div({});handle.className='handle';sheet.appendChild(handle);

  const body=div({padding:'20px 24px'});
  const topRow=div({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'});
  topRow.appendChild(txt('h2',{fontSize:'17px',fontWeight:'800'},'Sauvegarde des données'));
  topRow.appendChild(btn({color:'#6b6860',padding:'4px',cursor:'pointer',border:'none',background:'none'},()=>setState({modal:null}),icon('x',18)));
  body.appendChild(topRow);
  body.appendChild(txt('p',{fontSize:'13px',color:'#6b6860',marginBottom:'24px',lineHeight:'1.6'},'Exportez vos recettes et planning dans un fichier JSON. Ce fichier peut être sauvegardé sur iCloud, Google Drive ou Dropbox, et réimporté sur n\'importe quel appareil.'));

  // Stats
  const stats=div({display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'24px'});
  const daysWithMeals=Object.values(_state.planning).filter(d=>d.midi||d.soir).length;
  [[_state.recipes.length,'recettes enregistrées'],[daysWithMeals,'jours planifiés']].forEach(([n,l])=>{
    const card=div({background:'#f0efe9',borderRadius:'10px',padding:'14px 16px',textAlign:'center'});
    card.appendChild(txt('p',{fontSize:'24px',fontWeight:'800',color:'#1a1917',lineHeight:'1'},String(n)));
    card.appendChild(txt('p',{fontSize:'11px',color:'#6b6860',marginTop:'3px'},l));
    stats.appendChild(card);
  });
  body.appendChild(stats);

  // Export button
  const exportBtn=btn({width:'100%',padding:'13px',borderRadius:'10px',background:'#d4836a',color:'white',fontSize:'14px',fontWeight:'800',cursor:'pointer',border:'none',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',marginBottom:'10px'},
    ()=>{exportJSON();setState({modal:null});},icon('download',16,'white'),'Exporter en JSON');
  body.appendChild(exportBtn);

  // Import zone
  const importWrap=div({border:'1.5px dashed rgba(0,0,0,0.15)',borderRadius:'10px',padding:'16px',textAlign:'center',cursor:'pointer',transition:'background .15s'});
  importWrap.addEventListener('mouseenter',()=>importWrap.style.background='#f0efe9');
  importWrap.addEventListener('mouseleave',()=>importWrap.style.background='transparent');
  const fileInput=el('input',{type:'file',accept:'.json',style:{display:'none'}});
  fileInput.addEventListener('change',e=>importJSON(e.target.files[0]));
  importWrap.appendChild(fileInput);
  importWrap.appendChild(txt('p',{fontSize:'13px',fontWeight:'700',color:'#6b6860',marginBottom:'3px'},'Importer un fichier JSON'));
  importWrap.appendChild(txt('p',{fontSize:'11px',color:'#9e9b94'},'Cliquez ou déposez un fichier repas-backup-*.json'));
  importWrap.addEventListener('click',()=>fileInput.click());
  importWrap.addEventListener('dragover',e=>{e.preventDefault();importWrap.style.background='#f0efe9';});
  importWrap.addEventListener('dragleave',()=>importWrap.style.background='transparent');
  importWrap.addEventListener('drop',e=>{e.preventDefault();importWrap.style.background='transparent';const f=e.dataTransfer.files[0];if(f)importJSON(f);});
  body.appendChild(importWrap);

  // Warning reset
  const resetRow=div({marginTop:'16px',paddingTop:'16px',borderTop:'1px solid rgba(0,0,0,0.07)',display:'flex',justifyContent:'space-between',alignItems:'center'});
  resetRow.appendChild(txt('p',{fontSize:'12px',color:'#9e9b94'},'Remettre à zéro toutes les données'));
  resetRow.appendChild(btn({padding:'7px 14px',borderRadius:'8px',background:'#fff5f5',color:'#991b1b',fontSize:'12px',fontWeight:'700',cursor:'pointer',border:'1px solid #fca5a5'},()=>{
    if(confirm('Remettre toutes les données à zéro ? Cette action est irréversible.')){
      localStorage.removeItem('rp_rec');localStorage.removeItem('rp_plan');
      setState({recipes:INIT_RECIPES,planning:buildPlan(),modal:null});
    }
  },'Réinitialiser'));
  body.appendChild(resetRow);

  sheet.appendChild(body);overlay.appendChild(sheet);
  return overlay;
}

function renderHeader(){
  const {view}=_state;
  const today=new Date();
  const wk=weekDays(_state.wkDate);
  const title=view==='month'?`${MONTHS[_state.curMonth]} ${_state.curYear}`:
    view==='week'?`${wk[0].getDate()} – ${wk[6].getDate()} ${MONTHS[wk[6].getMonth()]}`:
    'Mes recettes';

  const tabData=[['month','grid','Mois'],['week','cal','Semaine'],['recipes','book','Recettes']];
  const tabs=div({display:'flex',background:'#e8e7e0',borderRadius:'11px',padding:'3px',gap:'2px'},
    ...tabData.map(([v,ic,l])=>btn({
      display:'flex',alignItems:'center',gap:'5px',padding:'7px 11px',borderRadius:'8px',
      fontSize:'12px',fontWeight:'700',cursor:'pointer',transition:'all .15s',
      background:view===v?'#fff':'transparent',color:view===v?'#1a1917':'#6b6860',
      boxShadow:view===v?'0 1px 4px rgba(0,0,0,.1)':'none',border:'none',
    },()=>setState({view:v}),icon(ic,13),l))
  );

  const logoBox=div({display:'flex',alignItems:'center',gap:'10px',flex:'1'},
    div({width:'32px',height:'32px',borderRadius:'9px',background:'#d4836a',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',flexShrink:'0'},'🍽'),
    div({},
      el('h1',{style:{fontSize:'15px',fontWeight:'800',lineHeight:'1',letterSpacing:'-.01em'}},'Repas'),
      _state.syncing
        ? txt('p',{fontSize:'10px',color:'#d4836a',lineHeight:'1.3'},'Synchronisation…')
        : txt('p',{fontSize:'10px',color:'#6b6860',lineHeight:'1.3'},'Planning alimentaire')
    )
  );

  const dataBtn=btn({width:'32px',height:'32px',borderRadius:'8px',background:'#e8e7e0',display:'flex',alignItems:'center',justifyContent:'center',color:'#6b6860',cursor:'pointer',border:'none',flexShrink:'0'},
    ()=>setState({modal:{type:'data'}}),icon('download',15));

  const header=el('header',{style:{background:'rgba(245,244,240,0.95)',backdropFilter:'blur(16px)',borderBottom:'1px solid rgba(0,0,0,0.08)',position:'sticky',top:'0',zIndex:'40'}},
    div({maxWidth:'960px',margin:'0 auto',padding:'12px 16px',display:'flex',alignItems:'center',gap:'10px'},logoBox,tabs,dataBtn)
  );

  if(view!=='recipes'){
    const nav=div({maxWidth:'960px',margin:'0 auto',padding:'0 16px 11px',display:'flex',alignItems:'center',gap:'10px'},
      btn({width:'30px',height:'30px',borderRadius:'8px',background:'#e8e7e0',display:'flex',alignItems:'center',justifyContent:'center',color:'#6b6860',cursor:'pointer',border:'none',flexShrink:'0'},
        ()=>{
          if(view==='month'){let m=_state.curMonth-1,y=_state.curYear;if(m<0){m=11;y--;}setState({curMonth:m,curYear:y});}
          else{const n=new Date(_state.wkDate);n.setDate(n.getDate()-7);setState({wkDate:n});}
        },icon('cl',13)
      ),
      txt('p',{flex:'1',textAlign:'center',fontSize:'14px',fontWeight:'700'},title),
      btn({width:'30px',height:'30px',borderRadius:'8px',background:'#e8e7e0',display:'flex',alignItems:'center',justifyContent:'center',color:'#6b6860',cursor:'pointer',border:'none',flexShrink:'0'},
        ()=>{
          if(view==='month'){let m=_state.curMonth+1,y=_state.curYear;if(m>11){m=0;y++;}setState({curMonth:m,curYear:y});}
          else{const n=new Date(_state.wkDate);n.setDate(n.getDate()+7);setState({wkDate:n});}
        },icon('cr',13)
      )
    );
    header.appendChild(nav);
  }
  return header;
}

function renderMonthView(){
  const {curYear:y,curMonth:m,planning,recipes}=_state;
  const today=new Date();
  const fd=dow(new Date(y,m,1));
  const dim=new Date(y,m+1,0).getDate();

  const wrap=div({padding:'0 10px 20px'});

  // Day labels
  const labels=div({display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'2px',marginBottom:'3px'});
  DAYS.forEach(d=>labels.appendChild(txt('div',{textAlign:'center',fontSize:'10px',fontWeight:'700',color:'#9e9b94',padding:'5px 0',letterSpacing:'.05em'},d)));
  wrap.appendChild(labels);

  // Grid
  const grid=div({display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px'});
  // Empty cells
  for(let i=0;i<fd;i++) grid.appendChild(div({minHeight:'68px'}));
  // Day cells
  for(let d=1;d<=dim;d++){
    const k=key(y,m,d);
    const dp=planning[k]||{};
    const mR=getRecipe(dp.midi);

    const wrap=div({});
    wrap.appendChild(txt('label',{fontSize:'11px',fontWeight:'700',color:'#6b6860',display:'block',marginBottom:'5px',letterSpacing:'.04em',textTransform:'uppercase'},label));
    const container=div({display:'flex',flexDirection:'column',gap:'5px'});
    function renderItems(){
      container.innerHTML='';
      form[key].forEach((val,i)=>{
        const row=div({display:'flex',gap:'5px',alignItems:'flex-start'});
        if(key==='steps'){
          const num=div({width:'20px',height:'20px',borderRadius:'50%',background:'#d4836a',color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'10px',fontWeight:'800',flexShrink:'0',marginTop:'9px'},String(i+1));
          row.appendChild(num);
          const ta=document.createElement('textarea');ta.rows=2;ta.value=val;ta.placeholder=`Étape ${i+1}`;Object.assign(ta.style,{flex:'1',resize:'vertical',padding:'9px 12px',border:'1.5px solid rgba(0,0,0,0.13)',borderRadius:'10px',fontSize:'13px',fontFamily:'inherit',outline:'none'});
          ta.addEventListener('focus',()=>ta.style.borderColor='#d4836a');ta.addEventListener('blur',()=>ta.style.borderColor='rgba(0,0,0,0.13)');
          ta.addEventListener('input',e=>{form[key][i]=e.target.value;});row.appendChild(ta);
        } else {
          const inp=el('input',{type:'text',value:val,placeholder:`Ingrédient ${i+1}`});
          inp.style.flex='1';inp.addEventListener('input',e=>{form[key][i]=e.target.value;});row.appendChild(inp);
        }
        const rb=btn({padding:'0 7px',color:'#9e9b94',cursor:'pointer',border:'none',background:'none',marginTop:key==='steps'?'9px':'0'},()=>{form[key].splice(i,1);renderItems();},icon('x',12,'#9e9b94'));
        row.appendChild(rb);container.appendChild(row);
      });
    }
    renderItems();
    wrap.appendChild(container);
    const addB=btn({fontSize:'11px',color:'#d4836a',fontWeight:'700',marginTop:'2px',cursor:'pointer',border:'none',background:'none'},()=>{form[key].push('');renderItems();},`+ Ajouter ${key==='steps'?'une étape':'un ingrédient'}`);
    wrap.appendChild(addB);fields.appendChild(wrap);
  }
  dynList('Ingrédients','ingredients');
  dynList('Étapes de préparation','steps');

  // Buttons
  const btnRow=div({display:'flex',gap:'8px',paddingTop:'6px',paddingBottom:'4px'});
  btnRow.appendChild(btn({flex:'1',padding:'12px',borderRadius:'10px',background:'#f0efe9',color:'#6b6860',fontWeight:'700',fontSize:'13px',cursor:'pointer',border:'none'},()=>setState({modal:null}),'Annuler'));
  btnRow.appendChild(btn({flex:'2',padding:'12px',borderRadius:'10px',background:'#d4836a',color:'white',fontWeight:'800',fontSize:'13px',cursor:'pointer',border:'none'},()=>{
    if(!form.name.trim())return;
    const r={...form,id:form.id||`r${Date.now()}`,ingredients:form.ingredients.filter(Boolean),steps:form.steps.filter(Boolean),servings:parseInt(form.servings)||2,prep:parseInt(form.prep)||10,cook:parseInt(form.cook)||20};
    const list=[..._state.recipes];const idx=list.findIndex(x=>x.id===r.id);
    if(idx>=0)list[idx]=r;else list.push(r);
    saveLocal('rp_rec',list);saveRecipesToSupabase(list);setState({recipes:list,modal:null});
  },'Enregistrer'));
  fields.appendChild(btnRow);

  body.appendChild(fields);sheet.appendChild(body);overlay.appendChild(sheet);
  return overlay;
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  root.innerHTML='';

  const app=div({minHeight:'100vh',background:'#f5f4f0'});
  app.appendChild(renderHeader());

  const main=document.createElement('main');
  Object.assign(main.style,{maxWidth:'960px',margin:'0 auto',padding:'16px 4px 80px'});

  if(_state.view==='month') main.appendChild(renderMonthView());
  else if(_state.view==='week') main.appendChild(renderWeekView());
  else main.appendChild(renderRecipesView());

  app.appendChild(main);

  // Modal
  if(_state.modal){
    if(_state.modal.type==='day') app.appendChild(renderDayModal());
    else if(_state.modal.type==='assign') app.appendChild(renderAssignModal());
    else if(_state.modal.type==='recipe') app.appendChild(renderRecipeModal());
    else if(_state.modal.type==='form') app.appendChild(renderFormModal());
    else if(_state.modal.type==='data') app.appendChild(renderDataModal());
  }

  root.appendChild(app);
}

// ─── BOOT ─────────────────────────────────────────────────────────────────
// 1. Render immediately with localStorage data (instant)
render();
// 2. Then load from Supabase in background and update if different
(async()=>{
  setState({syncing:true});
  const{recipes,planning}=await loadFromSupabase();
  const updates={syncing:false};
  if(recipes)updates.recipes=recipes;
  if(planning)updates.planning=planning;
  if(recipes)saveLocal('rp_rec',recipes);
  if(planning)saveLocal('rp_plan',planning);
  setState(updates);
})();
</script>
