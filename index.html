<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Repas · Planning</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1917;-webkit-font-smoothing:antialiased}
#root{min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
input,textarea,select{font-family:inherit}
img{display:block}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.2);border-radius:2px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px);animation:fi .18s ease;padding:16px}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sheet{background:#fff;border-radius:20px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;padding-bottom:8px;animation:su .22s ease;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
@keyframes su{from{transform:scale(0.95);opacity:0}to{transform:scale(1);opacity:1}}
.handle{display:none}
input[type=text],input[type=url],textarea,select{width:100%;padding:10px 12px;border:1.5px solid rgba(0,0,0,0.13);border-radius:10px;font-size:14px;color:#1a1917;background:#fff;outline:none;transition:border-color .15s;display:block}
input:focus,textarea:focus,select:focus{border-color:#d4836a}
.fab{position:fixed;bottom:28px;right:24px;width:56px;height:56px;border-radius:50%;background:#d4836a;color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(212,131,106,0.5);z-index:50;transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
.fab:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(212,131,106,0.6)}
.fab:active{transform:scale(0.95)}
.fab-tooltip{position:fixed;bottom:94px;right:24px;background:#1a1917;color:white;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:50}
.fab-tooltip::after{content:'';position:absolute;top:100%;right:18px;border:6px solid transparent;border-top-color:#1a1917}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ─── DATA ──────────────────────────────────────────────────────────────────
const DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const DAYS_FULL=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

const INIT_RECIPES=[
  {id:'r1',name:'Riz au Poulet',type:'both',ingredients:['Riz 180g cru','Poulet 200g','Huile olive','Paprika, cumin','Citron ½','Persil'],steps:['Cuire le riz 18 min salé.','Assaisonner poulet, dorer 4 min/face.','Trancher et servir sur le riz.'],image:'https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=400&q=80',servings:2,prep:10,cook:20},
  {id:'r2',name:'Saumon Vapeur',type:'soir',ingredients:['Saumon 180g','Brocoli 200g','Carottes 150g','Sauce soja','Gingembre'],steps:['Légumes vapeur 12 min.','Poêler saumon 3 min/face.','Servir ensemble.'],image:'https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=400&q=80',servings:1,prep:10,cook:15},
  {id:'r3',name:'Pasta Bolognaise',type:'both',ingredients:['Pâtes 120g','Bœuf haché 150g','Tomates concassées','Ail 2 gousses','Parmesan 20g'],steps:['Faire revenir ail et viande.','Tomates + herbes, mijoter 20 min.','Pâtes al dente + parmesan.'],image:'https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=400&q=80',servings:2,prep:10,cook:25},
  {id:'r4',name:'Buddha Bowl',type:'midi',ingredients:['Quinoa 80g','Pois chiches 100g','Avocat ½','Concombre','Tahini 20g'],steps:['Cuire quinoa 15 min.','Rôtir pois chiches 20 min à 200°C.','Assembler avec sauce tahini citronnée.'],image:'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400&q=80',servings:1,prep:15,cook:20},
  {id:'r5',name:'Omelette Champignons',type:'soir',ingredients:['Œufs 3','Champignons 150g','Emmental 30g','Échalote','Beurre'],steps:['Faire revenir échalote et champignons.','Battre œufs, verser en poêle.','Garnir et plier.'],image:'https://images.unsplash.com/photo-1510693206972-df098062cb71?w=400&q=80',servings:1,prep:5,cook:10},
  {id:'r6',name:'Soupe Lentilles',type:'soir',ingredients:['Lentilles corail 100g','Bouillon 600ml','Carotte','Oignon','Cumin 1cc'],steps:['Faire revenir oignon+cumin.','Ajouter lentilles et bouillon.','Mijoter 25 min puis mixer.'],image:'https://images.unsplash.com/photo-1547592166-23ac45744acd?w=400&q=80',servings:2,prep:10,cook:25},
];

function buildPlan(){
  const p={},t=new Date(),y=t.getFullYear(),m=t.getMonth(),dim=new Date(y,m+1,0).getDate(),ids=['r1','r2','r3','r4','r5','r6'];
  for(let d=1;d<=dim;d++){const k=key(y,m,d);p[k]={midi:ids[(d-1)%6],soir:ids[(d+2)%6]};}
  return p;
}

function key(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function dow(date){const d=date.getDay();return d===0?6:d-1;}
function weekDays(date){const d=new Date(date);d.setDate(d.getDate()-dow(d));return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x;});}
// localStorage comme cache local (fallback offline)
function loadLocal(k,def){try{const s=localStorage.getItem(k);return s?JSON.parse(s):def;}catch{return def;}}
function saveLocal(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ─── SUPABASE ──────────────────────────────────────────────────────────────
const SB_URL='https://nvutjzxstfsjcsfbanpo.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dXRqenhzdGZzamNzZmJhbnBvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MTI3MzcsImV4cCI6MjA5NzI4ODczN30.WHdu2Y-sSrZGG9Pi_w5z7kKD_eG5cK5hKFaxIaQME3w';
const sbH={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

async function sbFetch(path,opts={}){
  const r=await fetch(SB_URL+'/rest/v1/'+path,{headers:Object.assign({},sbH,opts.headers||{}),method:opts.method||'GET',body:opts.body});
  if(!r.ok)throw new Error(await r.text());
  const txt=await r.text();return txt?JSON.parse(txt):[];
}

async function loadFromSupabase(){
  try{
    var sbResults=await Promise.all([
      sbFetch('recipes?select=*&order=id'),
      sbFetch('planning?select=*'),
      loadTagsFromSupabase(),
      loadRecipeTagsFromSupabase()
    ]);
    var recs=sbResults[0];var days=sbResults[1];var tagsRows=sbResults[2];var rtMap=sbResults[3];
    var recipes=recs.length>0?recs.map(function(r){return r.data;}):null;
    var planning={};
    days.forEach(function(d){var entry={};if(d.midi)entry.midi=d.midi;if(d.soir)entry.soir=d.soir;planning[d.day_key]=entry;});
    return{
      recipes:recipes,
      planning:Object.keys(planning).length>0?planning:null,
      tags:tagsRows||null,
      recipeTags:rtMap||null
    };
  }catch(e){console.warn('Supabase load error:',e);return{recipes:null,planning:null,tags:null,recipeTags:null};}
}

async function saveRecipesToSupabase(recipes){
  try{
    await sbFetch('recipes',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify(recipes.map(function(r){return{id:r.id,data:r,updated_at:new Date().toISOString()};}))});
  }catch(e){console.warn('SB save recipes:',e);}
}

async function savePlanningToSupabase(planning){
  try{
    const rows=Object.entries(planning).map(([k,v])=>({day_key:k,midi:v.midi||null,soir:v.soir||null,updated_at:new Date().toISOString()}));
    for(let i=0;i<rows.length;i+=50)
      await sbFetch('planning',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(rows.slice(i,i+50))});
  }catch(e){console.warn('SB save planning:',e);}
}

async function deleteRecipeFromSupabase(id){
  try{await sbFetch('recipes?id=eq.'+id,{method:'DELETE'});}catch(e){console.warn('SB delete:',e);}
}

// ─── SUPABASE TAGS ─────────────────────────────────────────────────────────
async function loadTagsFromSupabase(){
  try{
    var rows=await sbFetch('tags?select=*&order=group_name,label');
    return rows.length>0?rows:null;
  }catch(e){console.warn('SB load tags:',e);return null;}
}

async function saveTagToSupabase(tag){
  try{
    var row={slug:tag.slug,label:tag.label,color:tag.color,group_name:tag.group_name};
    if(tag.id){row.id=tag.id;}
    await sbFetch('tags',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body:JSON.stringify([row])});
  }catch(e){console.warn('SB save tag:',e);}
}

async function deleteTagFromSupabase(id){
  try{await sbFetch('tags?id=eq.'+id,{method:'DELETE'});}catch(e){console.warn('SB delete tag:',e);}
}

async function saveRecipeTagsToSupabase(recipeId, tagIds){
  try{
    // Supprimer les anciens liens
    await sbFetch('recipe_tags?recipe_id=eq.'+recipeId,{method:'DELETE'});
    // Insérer les nouveaux
    if(tagIds.length>0){
      var rows=tagIds.map(function(tid){return{recipe_id:recipeId,tag_id:tid};});
      await sbFetch('recipe_tags',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(rows)});
    }
  }catch(e){console.warn('SB save recipe_tags:',e);}
}

async function loadRecipeTagsFromSupabase(){
  try{
    var rows=await sbFetch('recipe_tags?select=*');
    // Retourne un objet {recipe_id: [tag_id, ...]}
    var map={};
    rows.forEach(function(r){
      if(!map[r.recipe_id])map[r.recipe_id]=[];
      map[r.recipe_id].push(r.tag_id);
    });
    return map;
  }catch(e){console.warn('SB load recipe_tags:',e);return {};}
}

// ─── MINI FRAMEWORK ────────────────────────────────────────────────────────
let _state={
  recipes:loadLocal('rp_rec',INIT_RECIPES),
  planning:loadLocal('rp_plan',null)||buildPlan(),
  tags:loadLocal('rp_tags',[]),
  recipeTags:loadLocal('rp_recipe_tags',{}),
  view:'month',
  curYear:new Date().getFullYear(),
  curMonth:new Date().getMonth(),
  wkDate:new Date(),
  modal:null,
  syncing:false,
};

function setState(patch){
  _state=Object.assign({},_state,typeof patch==='function'?patch(_state):patch);
  render();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────
function getRecipe(id){return _state.recipes.find(r=>r.id===id);}
function isToday(y,m,d){const t=new Date();return t.getFullYear()===y&&t.getMonth()===m&&t.getDate()===d;}
function colSlot(slot){return slot==='midi'?'#dde8f8':'#e8dcf8';}
function colText(slot){return slot==='midi'?'#2d4d80':'#4d2d80';}
function typeLabel(t){return 'Recette';}
function typeColor(t){return {bg:'#f0efe9',c:'#6b6860'};}

// ─── DOM HELPERS ──────────────────────────────────────────────────────────
function el(tag,props,...children){
  const e=document.createElement(tag);
  if(props){
    Object.entries(props).forEach(([k,v])=>{
      if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
      else if(k.startsWith('on')&&typeof v==='function')e.addEventListener(k.slice(2).toLowerCase(),v);
      else if(k==='className')e.className=v;
      else if(k==='htmlFor')e.htmlFor=v;
      else if(k==='value'&&(tag==='input'||tag==='textarea'||tag==='select')){e.value=v;}
      else if(k==='checked')e.checked=v;
      else if(k!=='key')e.setAttribute(k,v);
    });
  }
  var flat=[];(function fl(a){a.forEach(function(x){Array.isArray(x)?fl(x):flat.push(x);});})(children);flat.forEach(function(c){
    if(c==null||c===false||c===undefined)return;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return e;
}
function div(style,...children){return el('div',{style},...children);}
function btn(style,onClick,...children){return el('button',{style,onClick},...children);}
function txt(tag,style,text){const e=document.createElement(tag);Object.assign(e.style,style);e.textContent=text;return e;}
function img(src,style){const e=document.createElement('img');e.src=src;Object.assign(e.style,style);return e;}

// SVG icon
function icon(name,size=16,color='currentColor'){
  const paths={
    cal:'M8 2v2m8-2v2M3 8h18M5 4h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z',
    grid:'M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z',
    book:'M4 19.5A2.5 2.5 0 016.5 17H20M4 19.5A2.5 2.5 0 004 17V5a2 2 0 012-2h14v14H6.5a2.5 2.5 0 00-2.5 2.5z',
    plus:'M12 5v14M5 12h14',
    x:'M18 6L6 18M6 6l12 12',
    edit:'M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z',
    trash:'M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2',
    cl:'M15 18l-6-6 6-6',cr:'M9 18l6-6-6-6',
    ck:'M20 6L9 17l-5-5',
    clk:'M12 2a10 10 0 100 20A10 10 0 0012 2zM12 7v5l3 3',
    usr:'M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z',
    img:'M21 15l-5-5L5 21m16-6V5a2 2 0 00-2-2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2zm-10-9a1 1 0 11-2 0 1 1 0 012 0z',
    download:'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3',
  };
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',size);svg.setAttribute('height',size);
  svg.setAttribute('viewBox','0 0 24 24');svg.setAttribute('fill','none');
  svg.setAttribute('stroke',color);svg.setAttribute('stroke-width','1.8');
  svg.setAttribute('stroke-linecap','round');svg.setAttribute('stroke-linejoin','round');
  svg.style.display='inline-block';svg.style.verticalAlign='middle';svg.style.flexShrink='0';
  const path=document.createElementNS(ns,'path');
  path.setAttribute('d',paths[name]||'');
  svg.appendChild(path);
  return svg;
}

// ─── COMPONENTS ───────────────────────────────────────────────────────────

// ─── EXPORT / IMPORT JSON ─────────────────────────────────────────────────



function renderHeader(){
  var view=_state.view;
  const today=new Date();
  const wk=weekDays(_state.wkDate);
  const title=view==='month'?`${MONTHS[_state.curMonth]} ${_state.curYear}`:
    view==='week'?`${wk[0].getDate()} – ${wk[6].getDate()} ${MONTHS[wk[6].getMonth()]}`:
    'Mes recettes';

  const tabData=[['month','grid','Mois'],['week','cal','Semaine'],['recipes','book','Recettes']];
  const tabs=div({display:'flex',background:'#e8e7e0',borderRadius:'11px',padding:'3px',gap:'2px'},
    ...tabData.map(([v,ic,l])=>btn({
      display:'flex',alignItems:'center',gap:'5px',padding:'7px 11px',borderRadius:'8px',
      fontSize:'12px',fontWeight:'700',cursor:'pointer',transition:'all .15s',
      background:view===v?'#fff':'transparent',color:view===v?'#1a1917':'#6b6860',
      boxShadow:view===v?'0 1px 4px rgba(0,0,0,.1)':'none',border:'none',
    },()=>setState({view:v}),icon(ic,13),l))
  );

  const logoBox=div({display:'flex',alignItems:'center',gap:'10px',flex:'1'},
    div({width:'32px',height:'32px',borderRadius:'9px',background:'#d4836a',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',flexShrink:'0'},'🍽'),
    div({},
      el('h1',{style:{fontSize:'15px',fontWeight:'800',lineHeight:'1',letterSpacing:'-.01em'}},'Repas'),
      _state.syncing
        ? txt('p',{fontSize:'10px',color:'#d4836a',lineHeight:'1.3'},'Synchronisation…')
        : txt('p',{fontSize:'10px',color:'#6b6860',lineHeight:'1.3'},'Planning alimentaire')
    )
  );

  const header=el('header',{style:{background:'rgba(245,244,240,0.95)',backdropFilter:'blur(16px)',borderBottom:'1px solid rgba(0,0,0,0.08)',position:'sticky',top:'0',zIndex:'40'}},
    div({maxWidth:'960px',margin:'0 auto',padding:'12px 16px',display:'flex',alignItems:'center',gap:'10px'},logoBox,tabs)
  );

  if(view!=='recipes'){
    const nav=div({maxWidth:'960px',margin:'0 auto',padding:'0 16px 11px',display:'flex',alignItems:'center',gap:'10px'},
      btn({width:'30px',height:'30px',borderRadius:'8px',background:'#e8e7e0',display:'flex',alignItems:'center',justifyContent:'center',color:'#6b6860',cursor:'pointer',border:'none',flexShrink:'0'},
        ()=>{
          if(view==='month'){let m=_state.curMonth-1,y=_state.curYear;if(m<0){m=11;y--;}setState({curMonth:m,curYear:y});}
          else{const n=new Date(_state.wkDate);n.setDate(n.getDate()-7);setState({wkDate:n});}
        },icon('cl',13)
      ),
      txt('p',{flex:'1',textAlign:'center',fontSize:'14px',fontWeight:'700'},title),
      btn({width:'30px',height:'30px',borderRadius:'8px',background:'#e8e7e0',display:'flex',alignItems:'center',justifyContent:'center',color:'#6b6860',cursor:'pointer',border:'none',flexShrink:'0'},
        ()=>{
          if(view==='month'){let m=_state.curMonth+1,y=_state.curYear;if(m>11){m=0;y++;}setState({curMonth:m,curYear:y});}
          else{const n=new Date(_state.wkDate);n.setDate(n.getDate()+7);setState({wkDate:n});}
        },icon('cr',13)
      )
    );
    header.appendChild(nav);
  }
  return header;
}

function renderMonthView(){
  var y=_state.curYear;var m=_state.curMonth;var planning=_state.planning;var recipes=_state.recipes;
  const today=new Date();
  const fd=dow(new Date(y,m,1));
  const dim=new Date(y,m+1,0).getDate();

  const wrap=div({padding:'0 10px 20px'});

  // Day labels
  const labels=div({display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'2px',marginBottom:'3px'});
  DAYS.forEach(d=>labels.appendChild(txt('div',{textAlign:'center',fontSize:'10px',fontWeight:'700',color:'#9e9b94',padding:'5px 0',letterSpacing:'.05em'},d)));
  wrap.appendChild(labels);

  // Grid
  const grid=div({display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px'});
  // Empty cells
  for(let i=0;i<fd;i++) grid.appendChild(div({minHeight:'68px'}));
  // Day cells
  for(let d=1;d<=dim;d++){
    const k=key(y,m,d);
    const dp=planning[k]||{};
    const mR=getRecipe(dp.midi);
    const sR=getRecipe(dp.soir);
    const isT=isToday(y,m,d);

    const cell=div({background:'#fff',borderRadius:'10px',padding:'5px',cursor:'pointer',minHeight:'68px',
      border:isT?'2px solid #d4836a':'1px solid rgba(0,0,0,0.07)',transition:'box-shadow .15s'});

    // Date number
    const num=div({width:'20px',height:'20px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
      background:isT?'#d4836a':'transparent',fontSize:'11px',fontWeight:isT?'800':'400',
      color:isT?'white':'#1a1917',marginBottom:'3px'},String(d));
    cell.appendChild(num);

    // Meal chips
    const chips=div({display:'flex',flexDirection:'column',gap:'2px'});
    if(mR){
      const c=div({background:'#dde8f8',borderRadius:'4px',padding:'1px 4px',fontSize:'9px',color:'#2d4d80',fontWeight:'700',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'},`☀ ${mR.name}`);
      chips.appendChild(c);
    }
    if(sR){
      const c=div({background:'#e8dcf8',borderRadius:'4px',padding:'1px 4px',fontSize:'9px',color:'#4d2d80',fontWeight:'700',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'},`🌙 ${sR.name}`);
      chips.appendChild(c);
    }
    cell.appendChild(chips);
    cell.addEventListener('mouseenter',()=>cell.style.boxShadow='0 2px 10px rgba(0,0,0,.1)');
    cell.addEventListener('mouseleave',()=>cell.style.boxShadow='none');
    cell.addEventListener('click',()=>setState({modal:{type:'day',dateKey:k,date:new Date(y,m,d)}}));
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  return wrap;
}

function renderWeekView(){
  var wkDate=_state.wkDate;var planning=_state.planning;var recipes=_state.recipes;
  const days=weekDays(wkDate);
  const wrap=div({padding:'0 10px 20px'});
  const grid=div({display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'5px'});

  days.forEach((date,i)=>{
    const k=key(date.getFullYear(),date.getMonth(),date.getDate());
    const dp=planning[k]||{};
    const mR=getRecipe(dp.midi);
    const sR=getRecipe(dp.soir);
    const isT=isToday(date.getFullYear(),date.getMonth(),date.getDate());

    const col=div({display:'flex',flexDirection:'column',gap:'5px'});

    // Header
    const hdr=div({textAlign:'center',paddingBottom:'3px'});
    hdr.appendChild(txt('p',{fontSize:'10px',fontWeight:'700',color:'#9e9b94',letterSpacing:'.05em'},DAYS[i]));

function getRecipeTags(recipeId){
  var tagIds=_state.recipeTags[recipeId]||[];
  return _state.tags.filter(function(t){return tagIds.indexOf(t.id)>=0;});
}

function renderTagPill(tag, small){
  var size=small?'9px':'10px';
  var pad=small?'2px 7px':'3px 9px';
  var d=div({display:'inline-flex',alignItems:'center',padding:pad,borderRadius:'20px',fontSize:size,fontWeight:'700',background:tag.color+'22',color:tag.color,border:'1px solid '+tag.color+'44'},tag.label);
  return d;
}

function renderRecipesView(){
  var recipes=_state.recipes;
  var tags=_state.tags;
  var search='';
  var activeTagId=null;
  var wrap=div({padding:'0 10px 20px'});

  // Top row
  var topRow=div({display:'flex',gap:'7px',marginBottom:'12px'});
  var searchInput=el('input',{type:'text',placeholder:'Rechercher une recette…',style:{flex:'1'}});
  searchInput.addEventListener('input',function(e){search=e.target.value;refreshList();});
  topRow.appendChild(searchInput);
  var addBtn=btn({padding:'9px 14px',background:'#d4836a',color:'white',borderRadius:'10px',fontSize:'12px',fontWeight:'800',display:'flex',alignItems:'center',gap:'5px',flexShrink:'0',cursor:'pointer',border:'none'},
    function(){setState({modal:{type:'form',recipe:null}});},icon('plus',13,'white'),'Nouvelle');
  topRow.appendChild(addBtn);
  wrap.appendChild(topRow);

  // ── Filtres lisibles groupés par catégorie ──
  var filterWrap=div({marginBottom:'16px'});
  var groups={};
  tags.forEach(function(t){if(!groups[t.group_name])groups[t.group_name]=[];groups[t.group_name].push(t);});

  // Ligne "Toutes" + bouton gérer
  var topFilterRow=div({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'});
  var allBtn=btn({padding:'5px 14px',borderRadius:'20px',fontSize:'12px',fontWeight:'700',background:'#d4836a',color:'white',cursor:'pointer',border:'2px solid #d4836a'},
    function(){activeTagId=null;refreshFilters();refreshList();},'Toutes les recettes');
  topFilterRow.appendChild(allBtn);
  topFilterRow.appendChild(btn({fontSize:'11px',color:'#9e9b94',fontWeight:'600',cursor:'pointer',border:'none',background:'none',display:'flex',alignItems:'center',gap:'3px'},
    function(){setState({modal:{type:'manageTags'}});},icon('edit',11,'#9e9b94'),'Gérer'));
  filterWrap.appendChild(topFilterRow);

  // Un bloc par groupe
  var tagBtns=[];
  Object.keys(groups).forEach(function(grp){
    var grpBlock=div({
      background:'#fff',borderRadius:'10px',border:'1px solid rgba(0,0,0,0.07)',
      padding:'10px 12px',marginBottom:'6px'
    });
    // Titre du groupe
    grpBlock.appendChild(txt('p',{
      fontSize:'10px',fontWeight:'800',color:'#9e9b94',
      textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'8px'
    },grp));
    // Tags du groupe
    var pillsRow=div({display:'flex',gap:'5px',flexWrap:'wrap'});
    groups[grp].forEach(function(t){
      var b=btn({
        display:'flex',alignItems:'center',gap:'5px',
        padding:'5px 11px',borderRadius:'8px',fontSize:'12px',fontWeight:'600',
        background:'#f5f4f0',color:'#1a1917',
        border:'1.5px solid rgba(0,0,0,0.08)',cursor:'pointer',
        transition:'all .12s'
      },function(){activeTagId=activeTagId===t.id?null:t.id;refreshFilters();refreshList();});
      // Petit rond coloré + label texte
      var dot=div({width:'8px',height:'8px',borderRadius:'50%',background:t.color,flexShrink:'0'});
      b.appendChild(dot);
      b.appendChild(document.createTextNode(t.label));
      b.dataset.tagId=t.id;
      tagBtns.push(b);
      pillsRow.appendChild(b);
    });
    grpBlock.appendChild(pillsRow);
    filterWrap.appendChild(grpBlock);
  });

  if(tags.length===0){
    var emptyTags=div({background:'#fff',borderRadius:'10px',border:'1px solid rgba(0,0,0,0.07)',padding:'14px',textAlign:'center'});
    emptyTags.appendChild(txt('p',{fontSize:'12px',color:'#9e9b94'},'Aucune catégorie — cliquez sur Gérer pour en créer'));
    filterWrap.appendChild(emptyTags);
  }

  wrap.appendChild(filterWrap);

  function refreshFilters(){
    // Bouton "Toutes"
    var allActive=activeTagId===null;
    allBtn.style.background=allActive?'#d4836a':'transparent';
    allBtn.style.color=allActive?'white':'#6b6860';
    allBtn.style.border='2px solid '+(allActive?'#d4836a':'rgba(0,0,0,0.12)');
    // Tags individuels
    tagBtns.forEach(function(b){
      var tid=parseInt(b.dataset.tagId);
      var tag=tags.find(function(t){return t.id===tid;});
      if(!tag)return;
      var active=activeTagId===tid;
      b.style.background=active?tag.color:'#f5f4f0';
      b.style.color=active?'white':'#1a1917';
      b.style.border='1.5px solid '+(active?tag.color:'rgba(0,0,0,0.08)');
      // Le rond coloré reste visible dans tous les cas
      var dot=b.querySelector('div');
      if(dot)dot.style.background=active?'white':tag.color;
    });
  }

  var list=div({display:'flex',flexDirection:'column',gap:'7px'});
  wrap.appendChild(list);

  function refreshList(){
    list.innerHTML='';
    var fil=recipes.filter(function(r){
      var matchSearch=r.name.toLowerCase().includes(search.toLowerCase());
      var matchTag=activeTagId===null||(_state.recipeTags[r.id]||[]).indexOf(activeTagId)>=0;
      return matchSearch&&matchTag;
    });
    if(!fil.length){list.appendChild(txt('p',{textAlign:'center',padding:'40px 20px',color:'#9e9b94',fontSize:'13px'},'Aucune recette trouvée'));return;}
    fil.forEach(function(r){
      var rTags=getRecipeTags(r.id);
      var row=div({display:'flex',gap:'11px',padding:'11px 12px',background:'#fff',borderRadius:'10px',border:'1px solid rgba(0,0,0,0.07)',cursor:'pointer',transition:'box-shadow .15s'});
      if(r.image){var i=document.createElement('img');i.src=r.image;Object.assign(i.style,{width:'54px',height:'54px',borderRadius:'9px',objectFit:'cover',flexShrink:'0',display:'block'});row.appendChild(i);}
      var info=div({flex:'1',minWidth:'0'});
      var infoTop=div({display:'flex',justifyContent:'space-between',alignItems:'flex-start'});
      infoTop.appendChild(txt('p',{fontWeight:'800',fontSize:'14px',color:'#1a1917',marginBottom:'4px'},r.name));
      var btns=div({display:'flex',gap:'3px',flexShrink:'0'});
      var eb=btn({color:'#9e9b94',padding:'3px',cursor:'pointer',border:'none',background:'none'},function(e){e.stopPropagation();setState({modal:{type:'form',recipe:r}});},icon('edit',13));
      var db=btn({color:'#9e9b94',padding:'3px',cursor:'pointer',border:'none',background:'none'},function(e){
        e.stopPropagation();
        if(confirm('Supprimer cette recette ?')){
          var newRecs=_state.recipes.filter(function(x){return x.id!==r.id;});
          var newPlan=Object.assign({},_state.planning);
          Object.keys(newPlan).forEach(function(k){var d=Object.assign({},newPlan[k]);if(d.midi===r.id)delete d.midi;if(d.soir===r.id)delete d.soir;newPlan[k]=d;});
          var newRT=Object.assign({},_state.recipeTags);delete newRT[r.id];
          saveLocal('rp_rec',newRecs);saveLocal('rp_plan',newPlan);saveLocal('rp_recipe_tags',newRT);
          saveRecipesToSupabase(newRecs);savePlanningToSupabase(newPlan);
          deleteRecipeFromSupabase(r.id);
          setState({recipes:newRecs,planning:newPlan,recipeTags:newRT});
        }
      },icon('trash',13));
      btns.appendChild(eb);btns.appendChild(db);
      infoTop.appendChild(btns);info.appendChild(infoTop);
      // Tags pastilles
      if(rTags.length>0){
        var tagsRow=div({display:'flex',gap:'4px',flexWrap:'wrap',marginBottom:'5px'});
        rTags.forEach(function(t){tagsRow.appendChild(renderTagPill(t,true));});
        info.appendChild(tagsRow);
      }
      var meta=div({display:'flex',gap:'6px',flexWrap:'wrap',alignItems:'center'});
      var time=div({display:'flex',alignItems:'center',gap:'2px',fontSize:'10px',color:'#9e9b94'},icon('clk',9,'#9e9b94'),r.prep+r.cook+' min');
      var srv=div({display:'flex',alignItems:'center',gap:'2px',fontSize:'10px',color:'#9e9b94'},icon('usr',9,'#9e9b94'),r.servings+'p');
      meta.appendChild(time);meta.appendChild(srv);
      info.appendChild(meta);row.appendChild(info);
      row.addEventListener('mouseenter',function(){row.style.boxShadow='0 2px 8px rgba(0,0,0,.07)';});
      row.addEventListener('mouseleave',function(){row.style.boxShadow='none';});
      row.addEventListener('click',function(){setState({modal:{type:'recipe',recipe:r}});});
      list.appendChild(row);
    });
  }
  refreshList();
  return wrap;
}

function renderAssignModal(){
  var modal=_state.modal;var planning=_state.planning;var recipes=_state.recipes;
  var dateKey=modal.dateKey;var slot=modal.slot;var date=modal.date;
  const cur=(planning[dateKey]||{})[slot];

  const overlay=div({});overlay.className='overlay';
  overlay.addEventListener('click',()=>setState({modal:{type:'day',dateKey,date}}));
  const sheet=div({});sheet.className='sheet';sheet.style.maxWidth='640px';
  sheet.addEventListener('click',e=>e.stopPropagation());

  const handle=div({});handle.className='handle';sheet.appendChild(handle);

  const body=div({padding:'18px 22px'});
  body.appendChild(txt('h3',{fontSize:'16px',fontWeight:'800',marginBottom:'3px'},'Choisir un repas'));
  body.appendChild(txt('p',{fontSize:'12px',color:'#6b6860',marginBottom:'14px'},`${slot==='midi'?'Déjeuner':'Dîner'} · ${dateKey}`));

  const si=el('input',{type:'text',placeholder:'Rechercher…',style:{marginBottom:'12px'}});

  }

  function refreshList(){
    list.innerHTML='';
    if(cur){
      const rb=btn({display:'flex',alignItems:'center',gap:'8px',padding:'9px 12px',borderRadius:'10px',background:'#fff5f5',border:'1px solid #fca5a5',color:'#991b1b',fontSize:'12px',fontWeight:'700',width:'100%',cursor:'pointer'},
        ()=>doAssign(null),icon('x',12,'#991b1b'),'Retirer le repas actuel');
      list.appendChild(rb);
    }

      const info=div({flex:'1'});

      rb.appendChild(info);

  nameIn.addEventListener('input',e=>form.name=e.target.value);
  nameWrap.appendChild(nameIn);fields.appendChild(nameWrap);

  // type fixé à 'both' par défaut

  // Numbers
  const nums=div({display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px'});
  [['servings','Portions',form.servings],['prep','Prép. (min)',form.prep],['cook','Cuisson (min)',form.cook]].forEach(([k,l,v])=>{
    const w=div({});w.appendChild(txt('label',{fontSize:'11px',fontWeight:'700',color:'#6b6860',display:'block',marginBottom:'5px',letterSpacing:'.04em',textTransform:'uppercase'},l));
    const i=el('input',{type:'text',value:String(v)});i.addEventListener('input',e=>form[k]=e.target.value);w.appendChild(i);nums.appendChild(w);
  });
  fields.appendChild(nums);

  // Image — upload fichier OU url
  var imgWrap=div({});
  imgWrap.appendChild(txt('label',{fontSize:'11px',fontWeight:'700',color:'#6b6860',display:'block',marginBottom:'5px',letterSpacing:'.04em',textTransform:'uppercase'},'Photo'));

  // Preview
  var imgPreview=div({marginBottom:'8px',borderRadius:'12px',overflow:'hidden',display:form.image?'block':'none',height:'140px',background:'#f0efe9'});
  var imgPreviewImg=document.createElement('img');
  imgPreviewImg.src=form.image||'';
  Object.assign(imgPreviewImg.style,{width:'100%',height:'100%',objectFit:'cover',display:'block'});
  imgPreview.appendChild(imgPreviewImg);
  imgWrap.appendChild(imgPreview);

  // Zone upload
  var uploadZone=div({border:'1.5px dashed rgba(0,0,0,0.15)',borderRadius:'10px',padding:'14px',textAlign:'center',cursor:'pointer',transition:'background .15s',marginBottom:'8px'});
  var fileIn=el('input',{type:'file',accept:'image/*',style:{display:'none'}});

  function handleImageFile(file){
    if(!file||!file.type.startsWith('image/'))return;
    var reader=new FileReader();
    reader.onload=function(ev){
      form.image=ev.target.result;
      imgPreviewImg.src=ev.target.result;
      imgPreview.style.display='block';
      uploadZone.style.display='none';
    };
    reader.readAsDataURL(file);
  }

  fileIn.addEventListener('change',function(e){handleImageFile(e.target.files[0]);});
  uploadZone.addEventListener('click',function(){fileIn.click();});
  uploadZone.addEventListener('dragover',function(e){e.preventDefault();uploadZone.style.background='#f0efe9';});
  uploadZone.addEventListener('dragleave',function(){uploadZone.style.background='transparent';});
  uploadZone.addEventListener('drop',function(e){e.preventDefault();uploadZone.style.background='transparent';handleImageFile(e.dataTransfer.files[0]);});
  uploadZone.addEventListener('mouseenter',function(){uploadZone.style.background='#f0efe9';});
  uploadZone.addEventListener('mouseleave',function(){uploadZone.style.background='transparent';});

  uploadZone.appendChild(fileIn);
  uploadZone.appendChild(txt('p',{fontSize:'13px',fontWeight:'700',color:'#6b6860',marginBottom:'2px'},'📷 Choisir une photo'));
  uploadZone.appendChild(txt('p',{fontSize:'11px',color:'#9e9b94'},'Depuis ton téléphone ou ton PC'));
  imgWrap.appendChild(uploadZone);

  // Bouton retirer photo (si déjà une image)
  if(form.image){
    uploadZone.style.display='none';
    var removeBtn=btn({fontSize:'11px',color:'#d4836a',fontWeight:'700',cursor:'pointer',border:'none',background:'none',marginTop:'4px'},function(){
      form.image='';
      imgPreview.style.display='none';
      imgPreviewImg.src='';
      uploadZone.style.display='block';
      removeBtn.style.display='none';
    },'✕ Retirer la photo');
    imgWrap.appendChild(removeBtn);
  }

  // URL alternative (lien Unsplash etc.)
  var urlToggle=btn({fontSize:'11px',color:'#9e9b94',fontWeight:'600',cursor:'pointer',border:'none',background:'none',marginTop:'4px',display:'block'},function(){urlRow.style.display=urlRow.style.display==='none'?'block':'none';},'ou coller une URL…');
  var urlRow=div({display:'none',marginTop:'6px'});
  var imgIn=el('input',{type:'url',value:(form.image&&form.image.startsWith('http'))?form.image:'',placeholder:'https://images.unsplash.com/…'});
  imgIn.addEventListener('input',function(e){
    form.image=e.target.value;
    imgPreviewImg.src=e.target.value;
    imgPreview.style.display=e.target.value?'block':'none';
  });
  urlRow.appendChild(imgIn);
  imgWrap.appendChild(urlToggle);
  imgWrap.appendChild(urlRow);
  fields.appendChild(imgWrap);

  // Dynamic list helper
  function dynList(label,key){
    const wrap=div({});
    wrap.appendChild(txt('label',{fontSize:'11px',fontWeight:'700',color:'#6b6860',display:'block',marginBottom:'5px',letterSpacing:'.04em',textTransform:'uppercase'},label));
    const container=div({display:'flex',flexDirection:'column',gap:'5px'});
    function renderItems(){
      container.innerHTML='';
      form[key].forEach((val,i)=>{
        const row=div({display:'flex',gap:'5px',alignItems:'flex-start'});
        if(key==='steps'){
          const num=div({width:'20px',height:'20px',borderRadius:'50%',background:'#d4836a',color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'10px',fontWeight:'800',flexShrink:'0',marginTop:'9px'},String(i+1));
          row.appendChild(num);
          const ta=document.createElement('textarea');ta.rows=2;ta.value=val;ta.placeholder=`Étape ${i+1}`;Object.assign(ta.style,{flex:'1',resize:'vertical',padding:'9px 12px',border:'1.5px solid rgba(0,0,0,0.13)',borderRadius:'10px',fontSize:'13px',fontFamily:'inherit',outline:'none'});
          ta.addEventListener('focus',()=>ta.style.borderColor='#d4836a');ta.addEventListener('blur',()=>ta.style.borderColor='rgba(0,0,0,0.13)');
          ta.addEventListener('input',e=>{form[key][i]=e.target.value;});row.appendChild(ta);
        } else {
          const inp=el('input',{type:'text',value:val,placeholder:`Ingrédient ${i+1}`});
          inp.style.flex='1';inp.addEventListener('input',e=>{form[key][i]=e.target.value;});row.appendChild(inp);
        }
        const rb=btn({padding:'0 7px',color:'#9e9b94',cursor:'pointer',border:'none',background:'none',marginTop:key==='steps'?'9px':'0'},()=>{form[key].splice(i,1);renderItems();},icon('x',12,'#9e9b94'));
        row.appendChild(rb);container.appendChild(row);
      });
    }
    renderItems();
    wrap.appendChild(container);
    const addB=btn({fontSize:'11px',color:'#d4836a',fontWeight:'700',marginTop:'2px',cursor:'pointer',border:'none',background:'none'},()=>{form[key].push('');renderItems();},`+ Ajouter ${key==='steps'?'une étape':'un ingrédient'}`);
    wrap.appendChild(addB);fields.appendChild(wrap);
  }
  dynList('Ingrédients','ingredients');
  dynList('Étapes de préparation','steps');

  // ── Sélecteur de tags ──
  var selectedTagIds=loadLocal('rp_recipe_tags',{})[form.id]||[];
  var tagsWrap=div({});
  tagsWrap.appendChild(txt('label',{fontSize:'11px',fontWeight:'700',color:'#6b6860',display:'block',marginBottom:'8px',letterSpacing:'.04em',textTransform:'uppercase'},'Catégories'));
  var tagGroups={};
  _state.tags.forEach(function(t){if(!tagGroups[t.group_name])tagGroups[t.group_name]=[];tagGroups[t.group_name].push(t);});
  Object.keys(tagGroups).forEach(function(grp){
    var grpWrap=div({marginBottom:'8px'});
    grpWrap.appendChild(txt('p',{fontSize:'10px',fontWeight:'700',color:'#9e9b94',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:'5px'},grp));
    var pillsRow=div({display:'flex',flexWrap:'wrap',gap:'5px'});
    tagGroups[grp].forEach(function(t){
      var active=selectedTagIds.indexOf(t.id)>=0;
      var pill=btn({padding:'4px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',
        background:active?t.color:t.color+'22',color:active?'white':t.color,
        border:'1px solid '+(active?t.color:t.color+'44'),cursor:'pointer'},
        function(){
          var idx2=selectedTagIds.indexOf(t.id);
          if(idx2>=0)selectedTagIds.splice(idx2,1);else selectedTagIds.push(t.id);
          var isNowActive=selectedTagIds.indexOf(t.id)>=0;
          pill.style.background=isNowActive?t.color:t.color+'22';
          pill.style.color=isNowActive?'white':t.color;
          pill.style.border='1px solid '+(isNowActive?t.color:t.color+'44');
        },t.label);
      pillsRow.appendChild(pill);
    });
    grpWrap.appendChild(pillsRow);
    tagsWrap.appendChild(grpWrap);
  });
  if(_state.tags.length===0){
    tagsWrap.appendChild(txt('p',{fontSize:'12px',color:'#9e9b94',fontStyle:'italic'},'Aucune catégorie — créez-en depuis la vue Recettes'));
  }
  fields.appendChild(tagsWrap);

  // Buttons
  var btnRow=div({display:'flex',gap:'8px',paddingTop:'6px',paddingBottom:'4px'});
  btnRow.appendChild(btn({flex:'1',padding:'12px',borderRadius:'10px',background:'#f0efe9',color:'#6b6860',fontWeight:'700',fontSize:'13px',cursor:'pointer',border:'none'},function(){setState({modal:null});},'Annuler'));
  btnRow.appendChild(btn({flex:'2',padding:'12px',borderRadius:'10px',background:'#d4836a',color:'white',fontWeight:'800',fontSize:'13px',cursor:'pointer',border:'none'},function(){
    if(!form.name.trim())return;
    var recipeId=form.id||'r'+Date.now();
    var r=Object.assign({},form,{id:recipeId,ingredients:form.ingredients.filter(Boolean),steps:form.steps.filter(Boolean),servings:parseInt(form.servings)||2,prep:parseInt(form.prep)||10,cook:parseInt(form.cook)||20});
    var list=[..._state.recipes];var idx=list.findIndex(function(x){return x.id===r.id;});
    if(idx>=0)list[idx]=r;else list.push(r);
    var newRT=Object.assign({},_state.recipeTags);
    newRT[recipeId]=selectedTagIds;
    saveLocal('rp_rec',list);saveLocal('rp_recipe_tags',newRT);
    saveRecipesToSupabase(list);
    saveRecipeTagsToSupabase(recipeId,selectedTagIds);
    setState({recipes:list,recipeTags:newRT,modal:null});
  },'Enregistrer'));
  fields.appendChild(btnRow);

  body.appendChild(fields);sheet.appendChild(body);overlay.appendChild(sheet);
  return overlay;
}

function renderManageTagsModal(){
  var overlay=div({});overlay.className='overlay';
  overlay.addEventListener('click',function(){setState({modal:null});});
  var sheet=div({});sheet.className='sheet';sheet.style.maxWidth='560px';
  sheet.addEventListener('click',function(e){e.stopPropagation();});
  var handle=div({});handle.className='handle';sheet.appendChild(handle);

  var body=div({padding:'18px 22px'});
  var topRow=div({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px'});
  topRow.appendChild(txt('h2',{fontSize:'17px',fontWeight:'800'},'Gérer les catégories'));
  topRow.appendChild(btn({color:'#6b6860',padding:'4px',cursor:'pointer',border:'none',background:'none'},function(){setState({modal:null});},icon('x',18)));
  body.appendChild(topRow);

  // Formulaire nouvelle catégorie
  var newTag={label:'',color:'#d4836a',group_name:'Autre'};
  var formWrap=div({background:'#f5f4f0',borderRadius:'12px',padding:'14px',marginBottom:'18px'});
  formWrap.appendChild(txt('p',{fontSize:'11px',fontWeight:'800',color:'#6b6860',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'10px'},'Nouvelle catégorie'));

  var row1=div({display:'grid',gridTemplateColumns:'1fr auto auto',gap:'8px',marginBottom:'8px',alignItems:'end'});

  var lWrap=div({});lWrap.appendChild(txt('label',{fontSize:'10px',fontWeight:'700',color:'#9e9b94',display:'block',marginBottom:'4px'},'Nom'));
  var labelIn=el('input',{type:'text',placeholder:'Ex: Sans gluten',style:{fontSize:'13px'}});
  labelIn.addEventListener('input',function(e){newTag.label=e.target.value;});
  lWrap.appendChild(labelIn);row1.appendChild(lWrap);

  var cWrap=div({});cWrap.appendChild(txt('label',{fontSize:'10px',fontWeight:'700',color:'#9e9b94',display:'block',marginBottom:'4px'},'Couleur'));
  var colorIn=document.createElement('input');colorIn.type='color';colorIn.value=newTag.color;
  Object.assign(colorIn.style,{width:'40px',height:'40px',borderRadius:'8px',border:'1px solid rgba(0,0,0,0.1)',cursor:'pointer',padding:'2px'});
  colorIn.addEventListener('input',function(e){newTag.color=e.target.value;});
  cWrap.appendChild(colorIn);row1.appendChild(cWrap);

  var gWrap=div({});gWrap.appendChild(txt('label',{fontSize:'10px',fontWeight:'700',color:'#9e9b94',display:'block',marginBottom:'4px'},'Groupe'));
  var groupIn=el('input',{type:'text',placeholder:'Protéines…',value:'Autre',style:{fontSize:'13px',width:'100px'}});
  groupIn.addEventListener('input',function(e){newTag.group_name=e.target.value;});
  gWrap.appendChild(groupIn);row1.appendChild(gWrap);

  formWrap.appendChild(row1);
  formWrap.appendChild(btn({width:'100%',padding:'10px',borderRadius:'9px',background:'#d4836a',color:'white',fontSize:'13px',fontWeight:'800',cursor:'pointer',border:'none'},function(){
    if(!newTag.label.trim())return;
    var tag={id:null,slug:newTag.label.toLowerCase().replace(/[^a-z0-9]+/g,'-'),label:newTag.label,color:newTag.color,group_name:newTag.group_name||'Autre'};
    saveTagToSupabase(tag).then(function(){
      loadTagsFromSupabase().then(function(freshTags){
        if(freshTags){saveLocal('rp_tags',freshTags);setState({tags:freshTags,modal:{type:'manageTags'}});}
      });
    });
  },'+ Ajouter'));
  body.appendChild(formWrap);

  // Liste des tags existants groupés
  var groups={};
  _state.tags.forEach(function(t){if(!groups[t.group_name])groups[t.group_name]=[];groups[t.group_name].push(t);});
  Object.keys(groups).forEach(function(grp){
    body.appendChild(txt('p',{fontSize:'11px',fontWeight:'800',color:'#9e9b94',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'8px',marginTop:'4px'},grp));
    var grpList=div({display:'flex',flexDirection:'column',gap:'5px',marginBottom:'12px'});
    groups[grp].forEach(function(t){
      var row=div({display:'flex',alignItems:'center',gap:'10px',padding:'8px 12px',background:'#fff',borderRadius:'9px',border:'1px solid rgba(0,0,0,0.07)'});
      var dot=div({width:'12px',height:'12px',borderRadius:'50%',background:t.color,flexShrink:'0'});
      row.appendChild(dot);
      row.appendChild(txt('p',{flex:'1',fontSize:'13px',fontWeight:'600',color:'#1a1917'},t.label));
      row.appendChild(btn({color:'#9e9b94',padding:'3px',cursor:'pointer',border:'none',background:'none'},function(){
        if(!confirm('Supprimer "'+t.label+'" de toutes les recettes ?'))return;
        deleteTagFromSupabase(t.id).then(function(){
          loadTagsFromSupabase().then(function(freshTags){
            var newTags=freshTags||[];
            var newRT=Object.assign({},_state.recipeTags);
            Object.keys(newRT).forEach(function(rid){newRT[rid]=newRT[rid].filter(function(id){return id!==t.id;});});
            saveLocal('rp_tags',newTags);saveLocal('rp_recipe_tags',newRT);
            setState({tags:newTags,recipeTags:newRT,modal:{type:'manageTags'}});
          });
        });
      },icon('trash',13)));
      grpList.appendChild(row);
    });
    body.appendChild(grpList);
  });

  if(_state.tags.length===0){
    body.appendChild(txt('p',{textAlign:'center',color:'#9e9b94',fontSize:'13px',padding:'20px 0'},'Aucune catégorie pour l’instant'));
  }

  sheet.appendChild(body);overlay.appendChild(sheet);
  return overlay;
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  root.innerHTML='';

  const app=div({minHeight:'100vh',background:'#f5f4f0'});
  app.appendChild(renderHeader());

  const main=document.createElement('main');
  Object.assign(main.style,{maxWidth:'960px',margin:'0 auto',padding:'16px 4px 80px'});

  if(_state.view==='month') main.appendChild(renderMonthView());
  else if(_state.view==='week') main.appendChild(renderWeekView());
  else main.appendChild(renderRecipesView());

  app.appendChild(main);

  // Modal
  if(_state.modal){
    if(_state.modal.type==='day') app.appendChild(renderDayModal());
    else if(_state.modal.type==='assign') app.appendChild(renderAssignModal());
    else if(_state.modal.type==='recipe') app.appendChild(renderRecipeModal());
    else if(_state.modal.type==='form') app.appendChild(renderFormModal());
    else if(_state.modal.type==='manageTags') app.appendChild(renderManageTagsModal());
  }

  // FAB — bouton flottant nouvelle recette (masqué si modal ouverte)
  if(!_state.modal){
    var fab=document.createElement('button');
    fab.className='fab';
    fab.title='Nouvelle recette';
    fab.appendChild(icon('plus',24,'white'));
    fab.addEventListener('click',function(){setState({modal:{type:'form',recipe:null}});});

    // Tooltip au survol
    var tooltip=document.createElement('div');
    tooltip.className='fab-tooltip';
    tooltip.textContent='Nouvelle recette';
    fab.addEventListener('mouseenter',function(){tooltip.style.opacity='1';});
    fab.addEventListener('mouseleave',function(){tooltip.style.opacity='0';});

    root.appendChild(tooltip);
    root.appendChild(fab);
  }

  root.appendChild(app);
}

// ─── BOOT ─────────────────────────────────────────────────────────────────
// 1. Render immediately with localStorage data (instant)
render();
// 2. Then load from Supabase in background and update if different
(async()=>{
  setState({syncing:true});
  var sbData=await loadFromSupabase();
  var updates={syncing:false};
  if(sbData.recipes){updates.recipes=sbData.recipes;saveLocal('rp_rec',sbData.recipes);}
  if(sbData.planning){updates.planning=sbData.planning;saveLocal('rp_plan',sbData.planning);}
  if(sbData.tags){updates.tags=sbData.tags;saveLocal('rp_tags',sbData.tags);}
  if(sbData.recipeTags){updates.recipeTags=sbData.recipeTags;saveLocal('rp_recipe_tags',sbData.recipeTags);}
  setState(updates);
})();
</script>
</body>
</html>
