<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#f5f4f0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Repas &middot; Planning</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1917;-webkit-font-smoothing:antialiased}
#root{min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
input,textarea,select{font-family:inherit}
img{display:block}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.2);border-radius:2px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px);animation:fi .18s ease;padding:16px}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sheet{background:#fff;border-radius:20px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;padding-bottom:8px;animation:su .22s ease;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
@keyframes su{from{transform:scale(0.95);opacity:0}to{transform:scale(1);opacity:1}}
.handle{display:none}
.fab{position:fixed;bottom:28px;right:24px;width:56px;height:56px;border-radius:50%;background:#d4836a;color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(212,131,106,0.5);z-index:50;transition:transform .15s,box-shadow .15s}
.fab:hover{transform:scale(1.08)}
.fab:active{transform:scale(0.95)}
.fab-tooltip{position:fixed;bottom:94px;right:24px;background:#1a1917;color:white;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:50}
.fab-tooltip::after{content:'';position:absolute;top:100%;right:18px;border:6px solid transparent;border-top-color:#1a1917}
.grpbar::-webkit-scrollbar{display:none}
input[type=text],input[type=url],textarea,select{width:100%;padding:10px 12px;border:1.5px solid rgba(0,0,0,0.13);border-radius:10px;font-size:14px;color:#1a1917;background:#fff;outline:none;transition:border-color .15s;display:block}
input:focus,textarea:focus,select:focus{border-color:#d4836a}
</style>
</head>
<body>
<div id="root"></div>
<script>
var DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
var DAYS_FULL=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
var MONTHS=['Janvier','F\u00e9vrier','Mars','Avril','Mai','Juin','Juillet','Ao\u00fbt','Septembre','Octobre','Novembre','D\u00e9cembre'];
var INIT_RECIPES=[
  {id:'r1',name:'Riz au Poulet',type:'both',ingredients:['Riz 180g','Poulet 200g','Huile olive','Paprika','Citron','Persil'],steps:['Cuire riz 18 min.','Dorer poulet 4 min/face.','Servir sur le riz.'],image:'https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=400&q=80',servings:2,prep:10,cook:20},
  {id:'r2',name:'Saumon Vapeur',type:'soir',ingredients:['Saumon 180g','Brocoli 200g','Carottes 150g','Sauce soja','Gingembre'],steps:['L\u00e9gumes vapeur 12 min.','Po\u00ealer saumon 3 min/face.','Servir.'],image:'https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=400&q=80',servings:1,prep:10,cook:15},
  {id:'r3',name:'Pasta Bolognaise',type:'both',ingredients:['P\u00e2tes 120g','B\u0153uf hach\u00e9 150g','Tomates concass\u00e9es','Ail','Parmesan'],steps:['Faire revenir ail et viande.','Tomates + herbes 20 min.','P\u00e2tes + parmesan.'],image:'https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=400&q=80',servings:2,prep:10,cook:25},
  {id:'r4',name:'Buddha Bowl',type:'midi',ingredients:['Quinoa 80g','Pois chiches 100g','Avocat','Concombre','Tahini'],steps:['Cuire quinoa 15 min.','R\u00f4tir pois chiches.','Assembler avec tahini.'],image:'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400&q=80',servings:1,prep:15,cook:20},
  {id:'r5',name:'Omelette Champignons',type:'soir',ingredients:['\u0152ufs 3','Champignons 150g','Emmental 30g','\u00c9chalote'],steps:['Faire revenir \u00e9chalote et champignons.','Battre \u0153ufs, verser.','Garnir et plier.'],image:'https://images.unsplash.com/photo-1510693206972-df098062cb71?w=400&q=80',servings:1,prep:5,cook:10},
  {id:'r6',name:'Soupe Lentilles',type:'soir',ingredients:['Lentilles corail 100g','Bouillon 600ml','Carotte','Oignon','Cumin'],steps:['Faire revenir oignon.','Ajouter lentilles et bouillon.','Mijoter 25 min puis mixer.'],image:'https://images.unsplash.com/photo-1547592166-23ac45744acd?w=400&q=80',servings:2,prep:10,cook:25},
];
function buildPlan(){var p={},t=new Date(),y=t.getFullYear(),m=t.getMonth(),dim=new Date(y,m+1,0).getDate(),ids=['r1','r2','r3','r4','r5','r6'];for(var d=1;d<=dim;d++){var k=fmtKey(y,m,d);p[k]={midi:ids[(d-1)%6],soir:ids[(d+2)%6]};}return p;}
function fmtKey(y,m,d){return y+'-'+(m+1<10?'0':'')+(m+1)+'-'+(d<10?'0':'')+d;}
function dow(date){var d=date.getDay();return d===0?6:d-1;}
function getWeekDays(date){var d=new Date(date);d.setDate(d.getDate()-dow(d));return Array.from({length:7},function(_,i){var x=new Date(d);x.setDate(d.getDate()+i);return x;});}
function loadLocal(k,def){try{var s=localStorage.getItem(k);return s?JSON.parse(s):def;}catch(e){return def;}}
function saveLocal(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function isToday(y,m,d){var t=new Date();return t.getFullYear()===y&&t.getMonth()===m&&t.getDate()===d;}

// SUPABASE
var SB_URL='https://nvutjzxstfsjcsfbanpo.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dXRqenhzdGZzamNzZmJhbnBvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MTI3MzcsImV4cCI6MjA5NzI4ODczN30.WHdu2Y-sSrZGG9Pi_w5z7kKD_eG5cK5hKFaxIaQME3w';
var sbH={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
async function sbFetch(path,opts){opts=opts||{};var r=await fetch(SB_URL+'/rest/v1/'+path,{headers:Object.assign({},sbH,opts.headers||{}),method:opts.method||'GET',body:opts.body});if(!r.ok)throw new Error(await r.text());var t=await r.text();return t?JSON.parse(t):[];}
async function loadFromSupabase(){
  try{var res=await Promise.all([sbFetch('recipes?select=*&order=id'),sbFetch('planning?select=*'),sbFetch('tags?select=*&order=group_name,label'),sbFetch('recipe_tags?select=*')]);
  var recipes=res[0].length>0?res[0].map(function(r){return r.data;}):null;
  var planning={};res[1].forEach(function(d){var e={};if(d.midi)e.midi=d.midi;if(d.soir)e.soir=d.soir;planning[d.day_key]=e;});
  var recipeTags={};res[3].forEach(function(r){if(!recipeTags[r.recipe_id])recipeTags[r.recipe_id]=[];recipeTags[r.recipe_id].push(r.tag_id);});
  return{recipes:recipes,planning:Object.keys(planning).length>0?planning:null,tags:res[2].length>0?res[2]:null,recipeTags:recipeTags};}
  catch(e){console.warn('SB:',e);return{recipes:null,planning:null,tags:null,recipeTags:{}};}
}
async function saveRecipesToSB(recipes){try{await sbFetch('recipes',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(recipes.map(function(r){return{id:r.id,data:r,updated_at:new Date().toISOString()};}))});}catch(e){}}
async function savePlanningToSB(planning){try{var rows=Object.keys(planning).map(function(k){var v=planning[k];return{day_key:k,midi:v.midi||null,soir:v.soir||null,updated_at:new Date().toISOString()};});for(var i=0;i<rows.length;i+=50)await sbFetch('planning',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(rows.slice(i,i+50))});}catch(e){}}
async function deleteRecipeFromSB(id){try{await sbFetch('recipes?id=eq.'+id,{method:'DELETE'});}catch(e){}}
async function loadTagsFromSB(){try{var r=await sbFetch('tags?select=*&order=group_name,label');return r.length>0?r:null;}catch(e){return null;}}
async function saveTagToSB(tag){try{var row={slug:tag.slug,label:tag.label,color:tag.color,group_name:tag.group_name};if(tag.id)row.id=tag.id;await sbFetch('tags',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body:JSON.stringify([row])});}catch(e){}}
async function deleteTagFromSB(id){try{await sbFetch('tags?id=eq.'+id,{method:'DELETE'});}catch(e){}}
async function saveRecipeTagsToSB(recipeId,tagIds){try{await sbFetch('recipe_tags?recipe_id=eq.'+recipeId,{method:'DELETE'});if(tagIds.length>0)await sbFetch('recipe_tags',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(tagIds.map(function(tid){return{recipe_id:recipeId,tag_id:tid};}))});}catch(e){}}

// STATE
var _state={recipes:loadLocal('rp_rec',INIT_RECIPES),planning:loadLocal('rp_plan',null)||buildPlan(),tags:loadLocal('rp_tags',[]),recipeTags:loadLocal('rp_recipe_tags',{}),view:'month',curYear:new Date().getFullYear(),curMonth:new Date().getMonth(),wkDate:new Date(),modal:null,syncing:false};
function setState(patch){_state=Object.assign({},_state,typeof patch==='function'?patch(_state):patch);render();}

// DOM
function el(tag,props){var e=document.createElement(tag);if(props)Object.keys(props).forEach(function(k){var v=props[k];if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k.startsWith('on')&&typeof v==='function')e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='className')e.className=v;else if(k==='value'&&(tag==='input'||tag==='textarea'||tag==='select'))e.value=v;else if(k!=='key')e.setAttribute(k,v);});var args=Array.prototype.slice.call(arguments,2);args.forEach(function app(c){if(c==null||c===false)return;if(Array.isArray(c))c.forEach(app);else e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);});return e;}
function div(style){var a=[].concat(['div',{style:style}],Array.prototype.slice.call(arguments,1));return el.apply(null,a);}
function btn(style,onClick){var a=[].concat(['button',{style:style,onClick:onClick}],Array.prototype.slice.call(arguments,2));return el.apply(null,a);}
function txt(tag,style,text){var e=document.createElement(tag);Object.assign(e.style,style);e.textContent=text;return e;}
function icon(name,size,color){size=size||16;color=color||'currentColor';var paths={cal:'M8 2v2m8-2v2M3 8h18M5 4h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z',grid:'M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z',book:'M4 19.5A2.5 2.5 0 016.5 17H20M4 19.5A2.5 2.5 0 004 17V5a2 2 0 012-2h14v14H6.5a2.5 2.5 0 00-2.5 2.5z',plus:'M12 5v14M5 12h14',x:'M18 6L6 18M6 6l12 12',edit:'M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z',trash:'M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2',cl:'M15 18l-6-6 6-6',cr:'M9 18l6-6-6-6',ck:'M20 6L9 17l-5-5',clk:'M12 2a10 10 0 100 20A10 10 0 0012 2zM12 7v5l3 3',usr:'M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z'};var ns='http://www.w3.org/2000/svg';var svg=document.createElementNS(ns,'svg');svg.setAttribute('width',size);svg.setAttribute('height',size);svg.setAttribute('viewBox','0 0 24 24');svg.setAttribute('fill','none');svg.setAttribute('stroke',color);svg.setAttribute('stroke-width','1.8');svg.setAttribute('stroke-linecap','round');svg.setAttribute('stroke-linejoin','round');svg.style.display='inline-block';svg.style.verticalAlign='middle';svg.style.flexShrink='0';var path=document.createElementNS(ns,'path');path.setAttribute('d',paths[name]||'');svg.appendChild(path);return svg;}

function getRecipe(id){return _state.recipes.find(function(r){return r.id===id;});}
function getRecipeTags(rid){var ids=_state.recipeTags[rid]||[];return _state.tags.filter(function(t){return ids.indexOf(t.id)>=0;});}
function renderTagPill(tag,small){var sz=small?'9px':'10px',pad=small?'2px 7px':'3px 9px';return div({display:'inline-flex',alignItems:'center',padding:pad,borderRadius:'20px',fontSize:sz,fontWeight:'700',background:tag.color+'22',color:tag.color,border:'1px solid '+tag.color+'44'},tag.label);}

// SVG helper pour les demi-lunes
function makeDayCircle(day,hasMidi,hasSoir,isT){
  var ns='http://www.w3.org/2000/svg';
  var SZ=38,cx=19,cy=19,r=17;
  var svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',SZ);svg.setAttribute('height',SZ);svg.setAttribute('viewBox','0 0 38 38');
  // Fond selon etat
  if(isT){
    var bg=document.createElementNS(ns,'circle');bg.setAttribute('cx',cx);bg.setAttribute('cy',cy);bg.setAttribute('r',r);bg.setAttribute('fill','#d4836a');svg.appendChild(bg);
  } else if(hasMidi&&hasSoir){
    // Demi superieur = midi (bleu), demi inferieur = soir (violet)
    var p1=document.createElementNS(ns,'path');
    p1.setAttribute('d','M '+(cx-r)+' '+cy+' A '+r+' '+r+' 0 0 1 '+(cx+r)+' '+cy+' Z');
    p1.setAttribute('fill','#b8c9e8');svg.appendChild(p1);
    var p2=document.createElementNS(ns,'path');
    p2.setAttribute('d','M '+(cx-r)+' '+cy+' A '+r+' '+r+' 0 0 0 '+(cx+r)+' '+cy+' Z');
    p2.setAttribute('fill','#c9b8e8');svg.appendChild(p2);
  } else if(hasMidi){
    var c1=document.createElementNS(ns,'circle');c1.setAttribute('cx',cx);c1.setAttribute('cy',cy);c1.setAttribute('r',r);c1.setAttribute('fill','#b8c9e8');svg.appendChild(c1);
  } else if(hasSoir){
    var c2=document.createElementNS(ns,'circle');c2.setAttribute('cx',cx);c2.setAttribute('cy',cy);c2.setAttribute('r',r);c2.setAttribute('fill','#c9b8e8');svg.appendChild(c2);
  }
  var numEl=document.createElementNS(ns,'text');
  numEl.setAttribute('x',cx);numEl.setAttribute('y',cy);
  numEl.setAttribute('dominant-baseline','central');numEl.setAttribute('text-anchor','middle');
  numEl.setAttribute('font-size','15');numEl.setAttribute('font-weight',isT?'700':'400');
  numEl.setAttribute('font-family','-apple-system,BlinkMacSystemFont,sans-serif');
  numEl.setAttribute('fill',isT?'white':'#1a1917');
  numEl.textContent=String(day);svg.appendChild(numEl);
  return svg;
}

// HEADER
function renderHeader(){
  var view=_state.view,wk=getWeekDays(_state.wkDate);
  var title=view==='month'?MONTHS[_state.curMonth]+' '+_state.curYear:view==='week'?wk[0].getDate()+' \u2013 '+wk[6].getDate()+' '+MONTHS[wk[6].getMonth()]:'Mes recettes';
  var tabs=div({display:'flex',background:'#e8e7e0',borderRadius:'11px',padding:'3px',gap:'2px'});
  [['month','grid','Mois'],['week','cal','Semaine'],['recipes','book','Recettes']].forEach(function(v){var active=view===v[0];tabs.appendChild(btn({display:'flex',alignItems:'center',gap:'5px',padding:'7px 11px',borderRadius:'8px',fontSize:'12px',fontWeight:'700',background:active?'#fff':'transparent',color:active?'#1a1917':'#6b6860',boxShadow:active?'0 1px 4px rgba(0,0,0,.1)':'none',border:'none',cursor:'pointer'},function(vv){return function(){setState({view:vv});};}(v[0]),icon(v[1],13),v[2]));});
  var logoBox=div({display:'flex',alignItems:'center',gap:'10px',flex:'1'},div({width:'32px',height:'32px',borderRadius:'9px',background:'#d4836a',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',flexShrink:'0'},'\uD83C\uDF7D'),div({},el('h1',{style:{fontSize:'15px',fontWeight:'800',lineHeight:'1',letterSpacing:'-.01em'}},'Repas'),_state.syncing?txt('p',{fontSize:'10px',color:'#d4836a',lineHeight:'1.3'},'Synchronisation\u2026'):txt('p',{fontSize:'10px',color:'#6b6860',lineHeight:'1.3'},'Planning alimentaire')));
  var header=el('header',{style:{background:'rgba(245,244,240,0.95)',backdropFilter:'blur(16px)',borderBottom:'1px solid rgba(0,0,0,0.08)',position:'sticky',top:'0',zIndex:'40'}},div({maxWidth:'960px',margin:'0 auto',padding:'12px 16px',display:'flex',alignItems:'center',gap:'10px'},logoBox,tabs));
  if(view!=='recipes'){
    header.appendChild(div({maxWidth:'960px',margin:'0 auto',padding:'0 16px 11px',display:'flex',alignItems:'center',gap:'10px'},
      btn({width:'30px',height:'30px',borderRadius:'8px',background:'#e8e7e0',display:'flex',alignItems:'center',justifyContent:'center',color:'#6b6860',cursor:'pointer',border:'none',flexShrink:'0'},function(){if(view==='month'){var m2=_state.curMonth-1,y2=_state.curYear;if(m2<0){m2=11;y2--;}setState({curMonth:m2,curYear:y2});}else{var n=new Date(_state.wkDate);n.setDate(n.getDate()-7);setState({wkDate:n});}},icon('cl',13)),
      txt('p',{flex:'1',textAlign:'center',fontSize:'14px',fontWeight:'700'},title),
      btn({width:'30px',height:'30px',borderRadius:'8px',background:'#e8e7e0',display:'flex',alignItems:'center',justifyContent:'center',color:'#6b6860',cursor:'pointer',border:'none',flexShrink:'0'},function(){if(view==='month'){var m2=_state.curMonth+1,y2=_state.curYear;if(m2>11){m2=0;y2++;}setState({curMonth:m2,curYear:y2});}else{var n=new Date(_state.wkDate);n.setDate(n.getDate()+7);setState({wkDate:n});}},icon('cr',13))
    ));
  }
  return header;
}

// MONTH VIEW
function renderMonthView(){
  var y=_state.curYear,m=_state.curMonth,planning=_state.planning;
  var fd=dow(new Date(y,m,1)),dim=new Date(y,m+1,0).getDate();
  var isMobile=window.innerWidth<640;
  var wrap=div({padding:'0 10px 20px'});
  // Headers jours
  var letters=isMobile?['L','M','M','J','V','S','D']:DAYS;
  var labels=div({display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'2px',marginBottom:isMobile?'4px':'3px'});
  letters.forEach(function(d){labels.appendChild(txt('div',{textAlign:'center',fontSize:isMobile?'13px':'10px',fontWeight:'600',color:'#9e9b94',padding:'5px 0'},d));});
  wrap.appendChild(labels);
  var grid=div({display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:isMobile?'2px':'3px'});
  for(var i=0;i<fd;i++)grid.appendChild(div({minHeight:isMobile?'50px':'68px'}));
  for(var d=1;d<=dim;d++){
    (function(day){
      var k=fmtKey(y,m,day),dp=planning[k]||{};
      var hasMidi=!!dp.midi,hasSoir=!!dp.soir,isT=isToday(y,m,day);
      if(isMobile){
        // Style Apple Calendar
        var cell=div({display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',minHeight:'50px',padding:'2px 0'});
        cell.appendChild(makeDayCircle(day,hasMidi,hasSoir,isT));
        cell.addEventListener('click',function(){setState({modal:{type:'day',dateKey:k,date:new Date(y,m,day)}});});
        grid.appendChild(cell);
      } else {
        // Desktop : cartes avec chips
        var mR=getRecipe(dp.midi),sR=getRecipe(dp.soir);
        var cellD=div({background:'#fff',borderRadius:'10px',padding:'5px',cursor:'pointer',minHeight:'68px',border:isT?'2px solid #d4836a':'1px solid rgba(0,0,0,0.07)',transition:'box-shadow .15s'});
        cellD.appendChild(div({width:'20px',height:'20px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:isT?'#d4836a':'transparent',fontSize:'11px',fontWeight:isT?'800':'400',color:isT?'white':'#1a1917',marginBottom:'3px'},String(day)));
        var chips=div({display:'flex',flexDirection:'column',gap:'2px'});
        if(mR)chips.appendChild(div({background:'#dde8f8',borderRadius:'4px',padding:'1px 4px',fontSize:'9px',color:'#2d4d80',fontWeight:'700',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'},'\u2600 '+mR.name));
        if(sR)chips.appendChild(div({background:'#e8dcf8',borderRadius:'4px',padding:'1px 4px',fontSize:'9px',color:'#4d2d80',fontWeight:'700',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'},'\uD83C\uDF19 '+sR.name));
        cellD.appendChild(chips);
        cellD.addEventListener('mouseenter',function(){cellD.style.boxShadow='0 2px 10px rgba(0,0,0,.1)';});cellD.addEventListener('mouseleave',function(){cellD.style.boxShadow='none';});
        cellD.addEventListener('click',function(){setState({modal:{type:'day',dateKey:k,date:new Date(y,m,day)}});});
        grid.appendChild(cellD);
      }
    })(d);
  }
  wrap.appendChild(grid);
  // Legende mobile
  if(isMobile){
    var legend=div({display:'flex',gap:'20px',justifyContent:'center',marginTop:'14px',paddingTop:'12px',borderTop:'1px solid rgba(0,0,0,0.06)'});

  else if(_state.view==='week')main.appendChild(renderWeekView());
  else main.appendChild(renderRecipesView());
  app.appendChild(main);
  if(_state.modal){if(_state.modal.type==='day')app.appendChild(renderDayModal());else if(_state.modal.type==='assign')app.appendChild(renderAssignModal());else if(_state.modal.type==='recipe')app.appendChild(renderRecipeModal());else if(_state.modal.type==='form')app.appendChild(renderFormModal());else if(_state.modal.type==='manageTags')app.appendChild(renderManageTagsModal());}
